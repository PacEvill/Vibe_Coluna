# Configuração de deploy no Render - Monitoramento de Postura IoT (Monorepo)
services:
  - type: web
    name: posture-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "YOUR_FRONTEND_URL"
      - key: POSTURE_THRESHOLD_CM
        value: "25"
      - key: PYTHON_VERSION
        value: "3.12.0"
